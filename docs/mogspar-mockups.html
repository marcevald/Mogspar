<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Møgspar — UI Mockups</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,500;1,400&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}

:root {
  --accent:#1D9E75;--accent-dark:#085041;--accent-bg:#EAF3DE;--accent-text:#3B6D11;
  --amber:#BA7517;--amber-bg:#FAEEDA;--amber-text:#854F0B;
  --red-bg:#FCEBEB;--red-text:#A32D2D;
  --gray-bg:#F1EFE8;--gray-text:#5F5E5A;
  --info-bg:#E6F1FB;--info-text:#185FA5;
}
@media(prefers-color-scheme:dark){
  :root{
    --accent:#5DCAA5;--accent-dark:#9FE1CB;--accent-bg:#085041;--accent-text:#9FE1CB;
    --amber:#EF9F27;--amber-bg:#633806;--amber-text:#FAC775;
    --red-bg:#501313;--red-text:#F09595;
    --gray-bg:#2C2C2A;--gray-text:#B4B2A9;
    --info-bg:#042C53;--info-text:#85B7EB;
  }
}

body{
  font-family:'DM Sans',var(--font-sans,sans-serif);
  background:var(--color-background-tertiary,#f5f5f3);
  color:var(--color-text-primary,#1a1a18);
  min-height:100vh;padding:24px 16px;
  display:flex;flex-direction:column;align-items:center;gap:16px;
}

/* Nav bar */
.mnav{
  display:flex;align-items:center;gap:10px;
  width:100%;max-width:440px;
  background:var(--color-background-primary,#fff);
  border:0.5px solid var(--color-border-tertiary,rgba(0,0,0,.15));
  border-radius:var(--border-radius-lg,12px);
  padding:10px 14px;
}
.nbtn{
  width:34px;height:34px;border:0.5px solid var(--color-border-secondary,rgba(0,0,0,.25));
  border-radius:var(--border-radius-md,8px);
  background:var(--color-background-secondary,#f0f0ee);
  color:var(--color-text-primary,#1a1a18);
  cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:opacity .15s;
}
.nbtn:disabled{opacity:.3;cursor:default}
.ninfo{flex:1;text-align:center}
.nname{font-size:13px;font-weight:500;color:var(--color-text-primary,#1a1a18);display:block}
.ncnt{font-size:11px;color:var(--color-text-secondary,#666)}

/* Phone */
.phone{
  width:390px;height:760px;
  background:var(--color-background-primary,#fff);
  border:0.5px solid var(--color-border-secondary,rgba(0,0,0,.25));
  border-radius:40px;overflow:hidden;
  display:flex;flex-direction:column;
}
.pscroll{flex:1;overflow-y:auto;overflow-x:hidden;scrollbar-width:none;display:flex;flex-direction:column}
.pscroll::-webkit-scrollbar{display:none}

/* Status bar */
.sbar{
  padding:12px 24px 4px;display:flex;justify-content:space-between;
  font-size:11px;font-weight:500;color:var(--color-text-secondary,#666);flex-shrink:0;
}

/* App header */
.ahead{
  padding:12px 20px;border-bottom:0.5px solid var(--color-border-tertiary,rgba(0,0,0,.1));
  display:flex;align-items:center;justify-content:space-between;
  background:var(--color-background-primary,#fff);flex-shrink:0;
}
.atitle{font-size:17px;font-weight:500;color:var(--color-text-primary,#1a1a18)}
.asub{font-size:11px;color:var(--color-text-secondary,#666);margin-top:2px}

/* Content bg */
.cont{flex:1;padding:14px;background:var(--color-background-tertiary,#f5f5f3);overflow-y:auto}

/* Avatar */
.av{
  width:32px;height:32px;border-radius:50%;
  background:var(--accent);color:#fff;
  font-size:13px;font-weight:500;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}

/* Cards */
.card{
  background:var(--color-background-primary,#fff);
  border:0.5px solid var(--color-border-tertiary,rgba(0,0,0,.1));
  border-radius:var(--border-radius-lg,12px);
  padding:14px;margin-bottom:10px;
}
.csect{
  background:var(--color-background-primary,#fff);
  border:0.5px solid var(--color-border-tertiary,rgba(0,0,0,.1));
  border-radius:var(--border-radius-lg,12px);
  overflow:hidden;margin-bottom:12px;
}

/* Section label */
.slbl{
  font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;
  color:var(--color-text-secondary,#666);margin:14px 0 7px;
}

/* Badges */
.bdg{font-size:11px;font-weight:500;padding:3px 8px;border-radius:20px;display:inline-flex;align-items:center;gap:4px}
.bl{background:var(--accent-bg);color:var(--accent-text)}
.bo{background:var(--amber-bg);color:var(--amber-text)}
.bg{background:var(--gray-bg);color:var(--gray-text)}
.br{background:var(--red-bg);color:var(--red-text)}

/* Buttons */
.btnp{
  background:var(--accent);color:#fff;border:none;
  border-radius:var(--border-radius-md,8px);padding:12px 20px;
  font-size:14px;font-weight:500;font-family:inherit;
  cursor:pointer;width:100%;
}
.btns{
  background:var(--color-background-primary,#fff);
  color:var(--color-text-primary,#1a1a18);
  border:0.5px solid var(--color-border-secondary,rgba(0,0,0,.25));
  border-radius:var(--border-radius-md,8px);padding:9px 14px;
  font-size:13px;font-weight:500;font-family:inherit;cursor:pointer;
}
.btnam{
  background:var(--amber);color:#fff;border:none;
  border-radius:var(--border-radius-md,8px);padding:12px 20px;
  font-size:14px;font-weight:500;font-family:inherit;
  cursor:pointer;width:100%;
}

/* Tabs */
.tabs{
  display:flex;gap:0;background:var(--color-background-secondary,#ebebea);
  border-radius:var(--border-radius-md,8px);padding:3px;margin-bottom:18px;
}
.tab{
  flex:1;padding:8px;border:none;background:transparent;
  border-radius:6px;font-size:13px;font-weight:500;font-family:inherit;
  color:var(--color-text-secondary,#666);cursor:pointer;
}
.tab.on{
  background:var(--color-background-primary,#fff);
  color:var(--color-text-primary,#1a1a18);
  border:0.5px solid var(--color-border-tertiary,rgba(0,0,0,.1));
}

/* Field */
.fld{margin-bottom:12px}
.fld label{display:block;font-size:11px;font-weight:500;color:var(--color-text-secondary,#666);margin-bottom:5px}
.fld input{
  width:100%;background:var(--color-background-secondary,#f0f0ee);
  border:0.5px solid var(--color-border-tertiary,rgba(0,0,0,.1));
  border-radius:var(--border-radius-md,8px);padding:11px 13px;
  font-size:14px;font-family:inherit;color:var(--color-text-primary,#1a1a18);outline:none;
}

/* Player row */
.prow{
  display:flex;align-items:center;gap:10px;
  padding:11px 14px;
  border-bottom:0.5px solid var(--color-border-tertiary,rgba(0,0,0,.1));
}
.prow:last-child{border-bottom:none}
.seat{
  width:22px;height:22px;border-radius:50%;
  background:var(--accent);color:#fff;
  font-size:11px;font-weight:500;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.seat.empty{background:var(--color-background-secondary,#f0f0ee);color:var(--color-text-secondary,#666);border:0.5px solid var(--color-border-tertiary,rgba(0,0,0,.1))}

/* Bottom nav */
.bnav{
  display:flex;border-top:0.5px solid var(--color-border-tertiary,rgba(0,0,0,.1));
  background:var(--color-background-primary,#fff);padding:6px 0 12px;flex-shrink:0;
}
.nit{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;
  font-size:10px;font-weight:500;color:var(--color-text-secondary,#666);cursor:pointer;padding:4px;
}
.nit.on{color:var(--accent)}
.nico{font-size:17px;line-height:1.2}

/* Code block */
.cblk{
  background:var(--color-background-secondary,#f0f0ee);
  border:0.5px solid var(--color-border-tertiary,rgba(0,0,0,.1));
  border-radius:var(--border-radius-lg,12px);
  padding:18px;text-align:center;margin-bottom:12px;
}
.clbl{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;color:var(--color-text-secondary,#666);margin-bottom:8px}
.cval{font-family:'Lora',serif;font-size:30px;font-weight:500;letter-spacing:8px;color:var(--color-text-primary,#1a1a18)}

/* Round bar */
.rbar{
  background:var(--color-background-primary,#fff);
  border:0.5px solid var(--color-border-tertiary,rgba(0,0,0,.1));
  border-radius:var(--border-radius-lg,12px);
  padding:13px 14px;display:flex;justify-content:space-between;align-items:center;
  margin-bottom:12px;
}

/* Bid rows */
.brow{
  display:flex;align-items:center;gap:10px;
  padding:11px 14px;
  border-bottom:0.5px solid var(--color-border-tertiary,rgba(0,0,0,.1));
}
.brow:last-child{border-bottom:none}
.brow.active{background:var(--accent-bg)}
.brow.fbd{background:var(--red-bg)}
.bconf{
  width:44px;height:30px;border-radius:var(--border-radius-md,8px);
  background:var(--accent-bg);border:0.5px solid var(--accent);
  display:flex;align-items:center;justify-content:center;
  font-size:15px;font-weight:500;color:var(--accent-text);
}
.fpill{
  font-size:11px;font-weight:500;padding:3px 8px;border-radius:20px;
  background:var(--red-bg);color:var(--red-text);
  border:0.5px solid var(--red-text);white-space:nowrap;
}

/* Stepper */
.stpr{display:flex;align-items:center;gap:6px}
.sbtn{
  width:28px;height:28px;
  border:0.5px solid var(--color-border-secondary,rgba(0,0,0,.25));
  border-radius:var(--border-radius-md,8px);
  background:var(--color-background-primary,#fff);
  color:var(--color-text-primary,#1a1a18);
  font-size:16px;cursor:pointer;font-family:inherit;
  display:flex;align-items:center;justify-content:center;
}
.sval{width:30px;text-align:center;font-size:15px;font-weight:500}

/* Score table */
.stable{border-collapse:collapse;width:100%;font-size:12px}
.stable th,.stable td{padding:8px 6px;text-align:center;border-bottom:0.5px solid var(--color-border-tertiary,rgba(0,0,0,.1))}
.stable th{font-size:11px;font-weight:500;color:var(--color-text-secondary,#666);background:var(--color-background-secondary,#f0f0ee)}
.stable tr:last-child td{border-bottom:none}
.tex{color:var(--accent-text);font-weight:500}
.twr{color:var(--red-text)}
.tcur{color:var(--amber-text)}
.trow td{background:var(--color-background-secondary,#f0f0ee);font-weight:500}

/* Alert */
.alt{border-radius:var(--border-radius-md,8px);padding:10px 12px;font-size:12px;margin-bottom:10px}
.altw{background:var(--amber-bg);color:var(--amber-text);border:0.5px solid var(--amber)}
.alto{background:var(--accent-bg);color:var(--accent-text);border:0.5px solid var(--accent)}
.alti{background:var(--info-bg);color:var(--info-text);border:0.5px solid var(--info-text)}

/* Metrics */
.mgrid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-bottom:14px}
.met{background:var(--color-background-secondary,#f0f0ee);border-radius:var(--border-radius-md,8px);padding:12px 8px;text-align:center}
.mval{font-family:'Lora',serif;font-size:22px;font-weight:500;color:var(--color-text-primary,#1a1a18)}
.mlbl{font-size:10px;color:var(--color-text-secondary,#666);margin-top:3px}

/* Stat row */
.strow{
  display:flex;align-items:center;gap:12px;padding:12px 14px;
  border-bottom:0.5px solid var(--color-border-tertiary,rgba(0,0,0,.1));
}
.strow:last-child{border-bottom:none}
.rnk{font-family:'Lora',serif;font-size:16px;font-weight:500;width:20px;text-align:center;color:var(--color-text-secondary,#666);flex-shrink:0}
.rnk.r1{color:#BA7517}.rnk.r2{color:#888780}.rnk.r3{color:#C47D3A}

/* Logo screen */
.logo-area{text-align:center;padding:36px 24px 28px}
.logo-sp{font-size:42px;color:var(--color-text-primary,#1a1a18);display:block;margin-bottom:8px}
.logo-nm{font-family:'Lora',serif;font-size:32px;font-weight:500;color:var(--color-text-primary,#1a1a18);letter-spacing:-0.5px}
.logo-tg{font-size:12px;color:var(--color-text-secondary,#666);margin-top:5px}

/* Score game card extras */
.gctop{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.gccode{font-family:'Lora',serif;font-size:18px;font-weight:500;color:var(--color-text-primary,#1a1a18);letter-spacing:1px}
.gcmeta{font-size:11px;color:var(--color-text-secondary,#666);display:flex;gap:10px;margin-top:3px}
.gcfoot{font-size:11px;color:var(--color-text-secondary,#666);margin-top:2px}

/* Flex utils */
.row{display:flex;gap:8px}
.row .btnp,.row .btns{flex:1}
.gap8{height:8px}.gap12{height:12px}.gap16{height:16px}
.tc{text-align:center}
.txt-s{font-size:12px;color:var(--color-text-secondary,#666)}
.txt-lnk{font-size:13px;font-weight:500;color:var(--accent);cursor:pointer}
</style>

<div style="text-align:center">
  <div style="font-family:'Lora',serif;font-size:26px;font-weight:500;color:var(--color-text-primary,#1a1a18)">&#9824; Møgspar</div>
  <div style="font-size:12px;color:var(--color-text-secondary,#666);margin-top:4px">UI mockups — use arrows to browse all screens</div>
</div>

<div class="mnav">
  <button class="nbtn" id="pb" onclick="ps()">&#8592;</button>
  <div class="ninfo">
    <span class="nname" id="sn"></span>
    <span class="ncnt" id="sc"></span>
  </div>
  <button class="nbtn" id="nb" onclick="ns()">&#8594;</button>
</div>

<div class="phone">
  <div class="pscroll" id="ph"></div>
</div>

let cur=0;

function go(i){cur=i;render()}
function ns(){if(cur<S.length-1){cur++;render()}}
function ps(){if(cur>0){cur--;render()}}

function bidAdj(btn,d){
  const bv=document.getElementById('bidval');
  if(!bv)return;
  let n=parseInt(bv.textContent)+d;
  if(n<0)n=0;if(n>13)n=13;
  bv.textContent=n;
  const bb=document.getElementById('bidbtn');
  if(bb)bb.textContent='Confirm Louise\'s bid: '+n+' →';
}

function togRow(row){
  const isOpen=row.querySelector('.texp').style.display!=='none';
  document.querySelectorAll('#trick-list .brow').forEach(r=>r.style.background='');
  document.querySelectorAll('#trick-list .texp').forEach(e=>e.style.display='none');
  if(!isOpen){
    row.querySelector('.texp').style.display='block';
    row.style.background='var(--accent-bg)';
    row.querySelector('.tdisp').textContent=row.dataset.val||'0';
  }
}

function adjRow(btn,d){
  const row=btn.closest('.brow');
  const sv=row.querySelector('.sval');
  let n=parseInt(sv.textContent)+d;
  if(n<0)n=0;if(n>13)n=13;
  sv.textContent=n;
  row.dataset.val=n;
  row.querySelector('.tdisp').textContent=n;
  upd();
}

function adj(btn,d){
  const row=btn.closest('.brow');
  const sv=row.querySelector('.sval');
  let n=parseInt(sv.textContent)+d;
  if(n<0)n=0;if(n>13)n=13;
  sv.textContent=n;
  upd();
}

function upd(){
  const rows=document.querySelectorAll('#trick-list .brow');
  let t=0;rows.forEach(r=>t+=parseInt(r.dataset.val||0));
  const el=document.getElementById('ttl');
  if(el)el.textContent=t+' / 6';
  const ok=document.getElementById('altok');
  const wn=document.getElementById('altwn');
  const cb=document.getElementById('cfmbtn');
  if(ok&&wn&&cb){
    if(t===6){ok.style.display='block';wn.style.display='none';cb.disabled=false;cb.style.opacity='1'}
    else{ok.style.display='none';wn.style.display='block';cb.disabled=true;cb.style.opacity='.4'}
  }
}

function render(){
  const ph=document.getElementById('ph');
  ph.innerHTML=S[cur].html;
  ph.scrollTop=0;
  document.getElementById('sn').textContent=S[cur].name;
  document.getElementById('sc').textContent=(cur+1)+' of '+S.length+' screens';
  document.getElementById('pb').disabled=cur===0;
  document.getElementById('nb').disabled=cur===S.length-1;
}

render();

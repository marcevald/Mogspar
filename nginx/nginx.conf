events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # Gzip static assets
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # --------------------------------------------------------------------------
    # HTTP — redirect to HTTPS, except for Let's Encrypt ACME challenges
    # --------------------------------------------------------------------------
    server {
        listen 80;
        server_name spil.eltonevald.dk;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # --------------------------------------------------------------------------
    # HTTPS
    # --------------------------------------------------------------------------
    server {
        listen 443 ssl;
        server_name spil.eltonevald.dk;

        ssl_certificate     /etc/letsencrypt/live/spil.eltonevald.dk/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/spil.eltonevald.dk/privkey.pem;

        # Modern TLS — no TLS 1.0/1.1
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;

        # HSTS — tells browsers to always use HTTPS (uncomment after confirming SSL works)
        # add_header Strict-Transport-Security "max-age=63072000" always;

        # --------------------------------------------------------------------------
        # API — proxy to FastAPI backend, stripping the /api prefix
        # --------------------------------------------------------------------------
        location /api/ {
            proxy_pass         http://backend:8000/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # WebSocket upgrade support (for future use)
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
        }

        # --------------------------------------------------------------------------
        # Frontend — serve React SPA static files
        # --------------------------------------------------------------------------
        root /usr/share/nginx/html;
        index index.html;

        location / {
            # All unknown paths fall through to index.html for client-side routing
            try_files $uri $uri/ /index.html;
        }
    }
}

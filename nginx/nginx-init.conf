# Temporary nginx config used ONLY during initial certificate issuance.
# It only listens on port 80 so Let's Encrypt can complete the ACME challenge.
# After init-certs runs, this file is no longer used.

events {
    worker_connections 1024;
}

http {
    server {
        listen 80;
        server_name spil.eltonevald.dk;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 200 "certificate pending";
            add_header Content-Type text/plain;
        }
    }
}
